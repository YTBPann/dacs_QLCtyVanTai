<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách user</title>
</head>
<body>
<h1>Quản lý người dùng</h1>

<div th:if="${successMessage}" style="color: green;">
    <p th:text="${successMessage}"></p>
</div>

<p>
    <a th:href="@{/dashboard}">Về dashboard</a> |
    <a th:href="@{/users/create}">Tạo user mới</a>
</p>

<table border="1" cellpadding="8" cellspacing="0">
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Role</th>
        <th>Trạng thái</th>
        <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.username}"></td>
        <td th:text="${user.role}"></td>
        <td th:text="${user.enabled ? 'Đang hoạt động' : 'Đã tắt'}"></td>
        <td>
            <form th:if="${user.enabled}" th:action="@{/users/{id}/disable(id=${user.id})}" method="post" style="display:inline;">
                <button type="submit">Tắt</button>
            </form>

            <form th:if="${!user.enabled}" th:action="@{/users/{id}/enable(id=${user.id})}" method="post" style="display:inline;">
                <button type="submit">Bật</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
