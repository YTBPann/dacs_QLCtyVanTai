<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Quản lý vận tải</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 32px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
        .msg {
            margin-bottom: 12px;
            font-size: 14px;
            text-align: center;
        }
        .error {
            color: #dc2626;
        }
        .success {
            color: #16a34a;
        }
        .hint {
            margin-top: 14px;
            font-size: 13px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Đăng nhập hệ thống</h2>

    <div th:if="${param.error}" class="msg error">
        Sai tài khoản hoặc mật khẩu.
    </div>

    <div th:if="${param.logout}" class="msg success">
        Bạn đã đăng xuất.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Tên đăng nhập" required>
        <input type="password" name="password" placeholder="Mật khẩu" required>
        <button type="submit">Đăng nhập</button>
    </form>

    <div class="hint">
        Tài khoản mặc định: <b>admin</b> / <b>admin123</b>
    </div>
</div>
</body>
</html>
